name: Rakit AmneziaWG Flint Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    name: Kompilasi Mandiri AmneziaWG
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode Sumber
        uses: actions/checkout@v4

      - name: Siapkan Alat Kompilasi Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libncurses5-dev libssl-dev gettext unzip file wget

      - name: Ambil Source Code AmneziaWG
        run: |
          git clone --depth=1 https://github.com/amnezia-vpn/amneziawg-openwrt.git amnezia-src

      - name: Merakit Kompilasi Tools
        run: |
          # Langsung masuk ke folder src karena tidak ada folder perantara
          cd amnezia-src/src
          make
          mkdir -p ../output/bin
          cp amneziawg ../output/bin/
        continue-on-error: true

      - name: Simpan Hasil Jadi (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: AmneziaWG-Flint-Bypass
          path: amnezia-src/

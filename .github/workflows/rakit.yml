name: Rakit AmneziaWG Flint Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    name: Merakit Otomatis AmneziaWG Flint
    runs-on: ubuntu-22.04

    steps:
    - name: Ambil Kode Sumber
      uses: actions/checkout@v4

    - name: Siapkan Alat Kompilasi Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Unduh Sistem OpenWrt Otomatis
      run: |
        git clone --depth=1 --branch openwrt-21.02 https://github.com/openwrt/openwrt.git openwrt
        cd openwrt
        
        # Memperbaiki nama branch dari main menjadi master
        echo "src-git amnezia https://github.com/amnezia-vpn/amneziawg-openwrt.git;master" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # Tentukan target untuk ruter Flint (ipq6000)
        echo "CONFIG_TARGET_ipq6000=y" > .config
        echo "CONFIG_TARGET_ipq6000_generic=y" >> .config
        echo "CONFIG_TARGET_MULTI_PROFILE=y" >> .config
        echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
        echo "CONFIG_PACKAGE_amneziawg-tools=m" >> .config
        
        make defconfig

    - name: Memulai Proses Kompilasi Paket
      run: |
        cd openwrt
        # Merakit paket AmneziaWG langsung dari kode sumber dasar
        make package/amneziawg-tools/compile V=s

    - name: Simpan Hasil Jadi (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: AmneziaWG-Flint-IPK
        path: openwrt/bin/targets/ipq6000/generic/packages/

name: Rakit AmneziaWG Flint Modern

on:
  workflow_dispatch:

jobs:
  build:
    name: Kompilasi Paket IPK AmneziaWG
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode Sumber
        uses: actions/checkout@v4

      - name: Siapkan Alat Kompilasi Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Unduh SDK Modern (Jalur ImmortalWrt)
        run: |
          # Menggunakan SDK ImmortalWrt 23.05 yang foldernya dijamin aktif dan komplit
          wget https://downloads.immortalwrt.org/releases/23.05.3/targets/ipq6000/generic/immortalwrt-sdk-23.05.3-ipq6000-generic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf immortalwrt-sdk-*.tar.xz
          mv immortalwrt-sdk-* sdk

      - name: Suntik Resep AmneziaWG
        run: |
          cd sdk
          echo "src-git amnezia https://github.com/amnezia-vpn/amneziawg-openwrt.git;master" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          make defconfig
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=m" >> .config
          make defconfig

      - name: Proses Merakit File IPK Resmi
        run: |
          cd sdk
          make package/amneziawg-tools/compile V=s

      - name: Simpan Hasil Jadi (.IPK Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: AmneziaWG-Flint-IPK-Asli
          path: sdk/bin/packages/

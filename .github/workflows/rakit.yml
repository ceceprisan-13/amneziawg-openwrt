name: Rakit AmneziaWG Flint Modern

on:
  workflow_dispatch:

jobs:
  build:
    name: Kompilasi Paket IPK AmneziaWG
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode Sumber
        uses: actions/checkout@v4

      - name: Siapkan Alat Kompilasi Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Unduh SDK Modern (Pasti Ada)
        run: |
          # Menggunakan SDK versi 23.05.3 yang servernya super stabil dan aktif
          wget https://downloads.openwrt.org/releases/23.05.3/targets/ipq6000/generic/openwrt-sdk-23.05.3-ipq6000-generic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Suntik Resep AmneziaWG
        run: |
          cd sdk
          # Memasukkan feed paket AmneziaWG resmi
          echo "src-git amnezia https://github.com/amnezia-vpn/amneziawg-openwrt.git;master" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Mengaktifkan paket kompilasi
          make defconfig
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=m" >> .config
          make defconfig

      - name: Proses Merakit File IPK Resmi
        run: |
          cd sdk
          # Proses compile mandiri paketnya menjadi file .ipk
          make package/amneziawg-tools/compile V=s

      - name: Simpan Hasil Jadi (.IPK Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: AmneziaWG-Flint-IPK-Asli
          path: sdk/bin/packages/aarch64_cortex-a53/amnezia/

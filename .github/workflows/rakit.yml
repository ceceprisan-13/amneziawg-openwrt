name: Rakit AmneziaWG Flint Otomatis

on:
  workflow_dispatch:

jobs:
  build:
    name: Kompilasi Paket IPK AmneziaWG
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode Sumber
        uses: actions/checkout@v4

      - name: Siapkan Alat Kompilasi Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Unduh dan Ekstrak OpenWrt SDK Flint Lawas
        run: |
          wget https://archive.openwrt.org/releases/21.02.0/targets/ipq6000/generic/openwrt-sdk-21.02.0-ipq6000-generic_gcc-11.2.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Masukkan Resep AmneziaWG
        run: |
          cd sdk
          echo "src-git amnezia https://github.com/amnezia-vpn/amneziawg-openwrt.git;master" >> feeds.conf.default
          ./scripts/feeds update amnezia
          ./scripts/feeds install -a -p amnezia
          make defconfig
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=m" >> .config
          make defconfig

      - name: Proses Merakit File IPK
        run: |
          cd sdk
          make package/amneziawg-tools/compile V=s

      - name: Simpan Hasil Jadi (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: AmneziaWG-Flint-IPK
          path: sdk/bin/targets/ipq6000/generic/packages/
